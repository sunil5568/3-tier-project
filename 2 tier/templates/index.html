<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>
</head>
<body>

<h1>Task Manager</h1>

<form action="/add" method="POST">
    <input type="text" name="task">
    <button>Add Task</button>
</form>

<hr>

<ul>
{% for task in tasks %}
    <li>{{ task[1] }}</li>
{% endfor %}
</ul>

</body>
</html>
