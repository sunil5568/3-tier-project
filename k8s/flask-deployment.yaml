apiVersion: apps/v1
kind: Deployment

metadata:
  name: flask-app
  namespace: task-app

spec:

  replicas: 2

  selector:
    matchLabels:
      app: flask

  template:

    metadata:
      labels:
        app: flask

    spec:

      containers:

      - name: flask

        image: sunil2211/task-manager:5

        ports:
        - containerPort: 5000

        env:

        - name: DB_HOST
          value: postgres

        - name: DB_NAME
          value: taskdb

        - name: DB_USER
          value: admin

        - name: DB_PASS
          value: admin123